<!DOCTYPE html>

    <style>
        /* Basic styles for the top bar */
        body {
            margin: 0;
            font-family: Arial, sans-serif;
        }
        .top-bar {
            background-color: #f0f0f0;
            display: flex;
            align-items: center;
            padding: 0.5em 1em;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .top-bar nav a {
            text-decoration: none;
            margin-right: 1em;
            color: #333;
        }
        .top-bar nav a:hover {
            text-decoration: underline;
        }
        .sign-in {
            margin-left: auto; /* push Sign In to the right */
        }
        .sign-in button {
            padding: 0.5em 1em;
            cursor: pointer;
        }

        /* Basic body content styling */
        main {
            padding: 1em;
        }
    </style>
</head>
<body>
<header class="top-bar">
    <nav>
        <a href="index.html">Home</a>
        <a href="#">Test</a>
        <a href="#">Wiki</a>
        <a href="#">Community</a>
        <a href="#">Problem Archive</a>
    </nav>
    <div class="sign-in">
        <button>Sign In</button>
    </div>
</header>

<main>
    <h1>Welcome to the Math Website</h1>
    <p>
        Explore our resources, connect with the community, and test your math skills!
        (Note: Only the Home page is currently active; other sections are coming soon.)
    </p>

</html>
