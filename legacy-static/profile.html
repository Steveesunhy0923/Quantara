<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Profile</title>
    <!-- Firebase compat -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-storage-compat.js"></script>
    <script>
        firebase.initializeApp({
            apiKey:"AIzaSyCJTmL7fVTkf328MLSr-8je95CqtSxfMo0",
            projectId:"quantara-1",
            authDomain:"quantara-1.firebaseapp.com",
            storageBucket:"quantara-1.firebasestorage.app"
        });
        const auth=firebase.auth(),db=firebase.firestore(),st=firebase.storage();

    <link rel="stylesheet" href="avatar-picker.css">
    <style>
        body{font-family:system-ui,sans-serif;margin:0}
        #container{max-width:960px;margin:32px auto;padding:0 16px}
        #top{display:grid;grid-template-columns:160px 1fr;gap:20px;align-items:start}
        #pic{width:160px;height:160px;border-radius:50%;object-fit:cover;border:2px solid #ddd;background:#f2f2f2}
        #meta h1{margin:0 0 8px;font-size:1.8rem}
        #meta .sub{color:#666;margin-bottom:12px}
        #meta textarea{width:100%;min-height:120px;resize:vertical}
        #meta button{margin-top:.6rem;padding:.4rem 1.0rem;cursor:pointer}
        #bottom{margin-top:32px;min-height:240px;border-top:1px solid #eee;padding-top:16px;color:#777}
        nav#topbar{display:flex;background:#212121;color:#fff;padding:.5rem 1rem;gap:1rem}
        nav#topbar a{color:#fff;text-decoration:none}
    </style>
</head>
<body>
<nav id="topbar">
    <a href="index.html">Home</a>
    <a href="wiki.html">Wiki</a>
    <a href="test.html">Test</a>
    <a href="community.html">Community</a>
    <a href="#">Problem&nbsp;Archive</a>
    <span style="margin-left:auto"></span>
    <img id="avatar" src="https://via.placeholder.com/32" alt="profile" style="width:32px;height:32px;border-radius:50%;cursor:pointer;display:none;margin-right:.5rem">
</nav>
<div id="container">
  <div id="top">
    <img id="pic" src="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='160' height='160'><rect width='100%' height='100%' fill='%23eee'/><text x='50%' y='50%' dominant-baseline='middle' text-anchor='middle' font-size='20' fill='%23999'>Avatar</text></svg>" alt="avatar">
    <div id="meta">
      <h1 id="username">User</h1>
      <div class="sub" id="userid">&nbsp;</div>
      <label for="about">About</label>
      <textarea id="about" rows="6"></textarea>
      <div id="actions"></div>
    </div>
  </div>
  <div id="bottom">More profile content coming soon…</div>
  </div>

<script src="avatar-picker.js"></script>
<script>
    (async function(){
        const params = new URLSearchParams(location.search);
        const viewUid = params.get('uid');        // may be null

        // navbar avatar: show and click to current user's profile
        (function initTopbarAvatar(){
            const img = document.getElementById('avatar');
            if(!img) return;
            auth.onAuthStateChanged(async u=>{
                if(u){
                    try{
                        const s = await db.doc(`users/${u.uid}`).get();
                        const url = (s.exists && s.data().photoURL) || img.src;
                        img.src = url;
                    }catch(e){}
                    img.style.display='inline-block';
                    img.onclick = ()=> location.href = `profile.html?uid=${u.uid}`;
                }else{
                    img.style.display='none';
                    img.onclick = null;
                }
            });
        })();

        // wait for auth ready for page permissions
        const user = await new Promise(res=>auth.onAuthStateChanged(res));
        if(!user && !viewUid){ location.href='login.html'; return; }

        const uid   = viewUid || user.uid;        // whose profile we show
        const editable = user && user.uid === uid;

        const snap = await db.doc(`users/${uid}`).get();
        const data = snap.data()||{};
        const url  = data.photoURL || '';
        const name = data.username || 'anon';
        const about= data.about    || '';

        document.getElementById('username').textContent = name;
        document.getElementById('userid').textContent = `@${uid.slice(0,6)}…`;
        const picEl = document.getElementById('pic');
        if(url) picEl.src = url;
        picEl.onerror = ()=>{ picEl.src = "data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='160' height='160'><rect width='100%' height='100%' fill='%23eee'/><text x='50%' y='50%' dominant-baseline='middle' text-anchor='middle' font-size='20' fill='%23999'>Avatar</text></svg>"; };
        const aboutEl = document.getElementById('about');
        aboutEl.value = about;
        if(!editable) aboutEl.setAttribute('readonly','');
        const actions = document.getElementById('actions');

        if(editable){
            const pickerWrap = document.createElement('div');
            actions.appendChild(pickerWrap);
            AvatarPicker.create(pickerWrap, {
                initialUrl: url,
                onChange: async (newUrl, meta)=>{
                    try{
                        await db.doc(`users/${uid}`).set({ photoURL: newUrl, avatarKey: meta.id||null, avatarHex: meta.hex||null }, { merge:true });
                        picEl.src = newUrl;
                    }catch(e){ alert(e.message||e); }
                }
            });

            const saveBtn = document.createElement('button');
            saveBtn.id='saveBtn'; saveBtn.textContent='Save profile';
            actions.appendChild(saveBtn);
        }

        if(editable){
            document.getElementById('saveBtn').onclick=async()=>{
                await db.doc(`users/${uid}`).set({about:document.getElementById('about').value},{merge:true});
                alert('Profile saved');
            };
        }
    })();
</script>
</body>
</html>
