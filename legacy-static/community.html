<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Community</title>

    <!-- shared style sheet -->
    <link rel="stylesheet" href="style.css">
    <style>
        .post-card{border:1px solid #ddd;border-radius:8px;padding:1rem;margin-bottom:1rem;background:#fff;max-width:60ch}
        .post-card h3{margin:0 0 .25rem;font-size:1.1rem}
        .post-card small{color:#666}
        .post-body{margin:.5rem 0}
        .post-actions{display:flex;gap:.7rem;font-size:.9rem;color:#555}
        .post-actions button{border:none;background:none;cursor:pointer;color:inherit}
        .actions-right{margin-left:auto}

        #sidebar{align-items:flex-start}
        #new-post-btn{font-size:1.4rem;padding:.2rem .6rem;margin-bottom:.5rem;background:#1a73e8;color:#fff;border:none;border-radius:6px;cursor:pointer;width:100%}
        #forum-list button{display:block;width:100%;margin:2px 0;padding:.35rem;border:none;border-radius:4px;background:#f5f5f5;text-align:left;cursor:pointer}
        #forum-list button.active{background:#d2e3fc;font-weight:600}
    </style>

    <script src="Latex_render.js"></script>

    <!-- Firebase 9 compat (App, Auth, Firestore) -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <script>
        const firebaseConfig={apiKey:"AIzaSyCJTmL7fVTkf328MLSr-8je95CqtSxfMo0",projectId:"quantara-1",authDomain:"quantara-1.firebaseapp.com"};
        firebase.initializeApp(firebaseConfig);
    </script>

    <!-- MathJax -->
    <script>window.MathJax={tex:{inlineMath:[["$","$"],["\\(","\\)"]],displayMath:[["$$","$$"],["\\[","\\]"]],packages:{'[+]':['ams']}}};</script>
    <script async id="MathJax-script" src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <!-- TikZ rendering removed on community; MathJax only -->
</head>
<body>
<script>
  // This repo now has a React Community page at `/community`.
  // If you're seeing this legacy page in a hosted environment, redirect to the React route.
  (function(){
    if (location.protocol !== 'file:') {
      location.replace('/community');
    }
  })();
</script>
<nav id="topbar">
    <a href="/">Home</a>
    <a href="/wiki">Wiki</a>
    <a href="/test">Test</a>
    <a href="/community">Community</a>
    <a href="#">Problem&nbsp;Archive</a>
    <span style="margin-left:auto"></span>
    <img id="navAvatar" src="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='28' height='28'><rect width='100%' height='100%' fill='%23ccc'/><text x='50%' y='50%' dominant-baseline='middle' text-anchor='middle' font-size='10' fill='%23666'>?</text></svg>" alt="profile" style="width:28px;height:28px;border-radius:50%;cursor:pointer;display:none;margin-right:.5rem">
    <button id="login-btn">Login</button>
    <button id="logout-btn" style="display:none">Logout</button>
</nav>

<div id="main">
    <aside id="sidebar">
        <button id="new-post-btn" title="New post">＋</button>
        <nav id="forum-list">
            <button data-forum="">🏠 All</button>
            <button data-forum="algebra">Algebra</button>
            <button data-forum="geometry">Geometry</button>
            <button data-forum="number theory">Number&nbsp;Theory</button>
            <button data-forum="combinatorics">Combinatorics</button>
            <button data-forum="calculus">Calculus</button>
        </nav>
    </aside>
    <section id="content"></section>
</div>

<script>
    window.addEventListener('DOMContentLoaded', function(){
        const auth = firebase.auth();
        const db   = firebase.firestore();
        // Dev note: this legacy page is kept for reference; prefer the React app routes under /app.

        /* ---------- auth ui ----------- */
        const loginBtn  = document.getElementById('login-btn');
        const logoutBtn = document.getElementById('logout-btn');

        if (loginBtn)  loginBtn.onclick  = () => location.href='login.html';
        if (logoutBtn) logoutBtn.onclick = () => auth.signOut();

        let isAdmin = false; // moved before listener to avoid TDZ errors

        // init navbar avatar and admin toggle
        auth.onAuthStateChanged(async u=>{
            const img = document.getElementById('navAvatar');
            if (u && img){
                try{
                    const snap = await db.doc(`users/${u.uid}`).get();
                    const url  = (snap.exists && snap.data().photoURL) || img.src;
                    img.src = url; img.style.display='inline-block';
                    img.onclick = ()=> location.href = `profile.html?uid=${u.uid}`;
                }catch(e){ img.style.display='inline-block'; img.onclick = ()=> location.href = `profile.html?uid=${u.uid}`; }
            }else if(img){
                img.style.display='none';
            }

            let admin=false;
            if (u){
                try{ const tok = await u.getIdTokenResult(true); admin = !!tok.claims.admin; }catch(e){}
            }
            const prev = isAdmin;
            isAdmin = admin;
            if (prev !== isAdmin) listen();
        });

        /* ---------- feed  ------------- */
        const feed      = document.getElementById('content');
        const listNav   = document.getElementById('forum-list');
        const newBtn    = document.getElementById('new-post-btn');
        let   forum     = "";          // current filter
        let   detach    = null;        // Firestore listener handle
        const userCache = new Map();   // uid → {name,photo}

        async function getUser(uid){
            const cached = userCache.get(uid);
            if (cached && !cached.photo.includes('placeholder')) return cached;
            const snap = await db.doc(`users/${uid}`).get();
            const dat  = snap.exists ? snap.data() : {};
            const obj  = { name: dat.username || 'anon', photo: dat.photoURL || 'data:image/svg+xml;utf8,<svg xmlns=\'http://www.w3.org/2000/svg\' width=\'24\' height=\'24\'><rect width=\'100%\' height=\'100%\' fill=\'%23ccc\'/><text x=\'50%\' y=\'50%\' dominant-baseline=\'middle\' text-anchor=\'middle\' font-size=\'9\' fill=\'%23666\'>?</text></svg>' };
            userCache.set(uid, obj);
            return obj;
        }

        async function renderPost(doc){
            const d   = doc.data();
            const uid = auth.currentUser && auth.currentUser.uid;
            const canDel = uid && (uid===d.author || isAdmin);
            const prof = await getUser(d.author);

            const card = document.createElement('article');
            card.className='post-card';
            card.innerHTML=`
      <div style="display:flex;align-items:center;gap:.4rem;margin-bottom:.3rem">
        <img src="${prof.photo}" data-uid="${d.author}" style="width:24px;height:24px;border-radius:50%;cursor:pointer">
        <span class="author" data-uid="${d.author}" style="cursor:pointer">${prof.name}</span>
      </div>
      <h3>${d.title}</h3>
      <small>${(d.discussion||'misc').toUpperCase()} · ${(d.time&&d.time.toDate?d.time.toDate():new Date()).toLocaleString()}</small>
      <div class="post-body">${latexMarkupToHTML(d.post)}</div>
      ${Array.isArray(d.imageURLs)&&d.imageURLs.length?`
      <div class="post-images" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:6px;margin:.5rem 0 0">
        ${d.imageURLs.map(u=>`<a href="${u}" target="_blank" rel="noopener"><img loading="lazy" src="${u}" alt="image" style="width:100%;height:120px;object-fit:cover;border-radius:6px"></a>`).join('')}
      </div>`:''}
      <div class="post-actions">
        <button class="like-btn">👍 <span>${d.likes||0}</span></button>
        <button class="comment-btn">💬 <span>${d.comments||0}</span></button>
        <span class="actions-right">${canDel?'<button class="del-btn">🗑️</button>':''}</span>
      </div>`;

            card.querySelectorAll('[data-uid]').forEach(el=>{
                el.onclick = e=>{ const to = e.currentTarget.getAttribute('data-uid'); location.href = `profile.html?uid=${to}`; };
            });

            card.querySelector('.like-btn').onclick=async()=>{
                if(!auth.currentUser){alert('Login first');return;}
                // Rules no longer allow clients to update `communityPosts.likes` directly.
                // New model: one like doc per user at communityPosts/{postId}/likes/{uid}.
                const uid = auth.currentUser.uid;
                const likeRef = db.doc(`communityPosts/${doc.id}/likes/${uid}`);
                const likeSnap = await likeRef.get();
                if (likeSnap.exists){
                    await likeRef.delete();
                } else {
                    await likeRef.set({ createdAt: firebase.firestore.FieldValue.serverTimestamp() });
                }
                // UI count is maintained by Cloud Functions in production; legacy page may lag until next snapshot.
            };

            if(canDel){
                card.querySelector('.del-btn').onclick=async()=>{ if(confirm('Delete this post?')) await doc.ref.delete(); };
            }

            renderLatex(card);
            feed.appendChild(card);
        }

        function listen(){
            if(detach) detach();
            feed.textContent='Loading…';
            let ref=db.collection('communityPosts').orderBy('time','desc');
            if(forum) ref=ref.where('discussion','==',forum);
            detach=ref.limit(50).onSnapshot(qs=>{
                feed.innerHTML='';
                qs.forEach(renderPost);
                if(!qs.size) feed.textContent='No posts yet.';
            });
        }

        listNav.addEventListener('click',e=>{
            const btn=e.target.closest('button[data-forum]');
            if(!btn) return;
            forum=btn.getAttribute('data-forum');
            Array.from(listNav.children).forEach(b=>b.classList.toggle('active',b===btn));
            listen();
        });

        if (newBtn) newBtn.onclick = ()=>{
            if(!auth.currentUser){alert('Please login first');return;}
            location.href='new-post.html';
        };

        listen();
    });
</script>
</body>
</html>
