<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="1800" viewBox="0 0 1200 1800">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#e9f4ff"/>
      <stop offset="1" stop-color="#ffffff"/>
    </linearGradient>
    <linearGradient id="water" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#b7e3ff"/>
      <stop offset="1" stop-color="#4ba3d8"/>
    </linearGradient>
    <linearGradient id="ice" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#cfe9ff"/>
    </linearGradient>
  </defs>

  <!-- Sky -->
  <rect x="0" y="0" width="1200" height="600" fill="url(#sky)"/>

  <!-- Water -->
  <rect x="0" y="600" width="1200" height="1200" fill="url(#water)"/>
  <rect x="0" y="595" width="1200" height="10" fill="#8dd2ff" opacity="0.7"/>

  <!-- Iceberg placeholder -->
  <path d="M600 180
           L760 420
           L980 520
           L780 600
           L650 740
           L540 640
           L360 610
           L240 520
           L460 420
           Z"
        fill="url(#ice)" stroke="#b7d9f5" stroke-width="6"/>

  <!-- Below surface -->
  <path d="M240 520
           L360 610
           L540 640
           L650 740
           L780 600
           L980 520
           L930 780
           L780 1040
           L640 1400
           L540 1600
           L460 1420
           L360 1100
           L250 820
           Z"
        fill="#d9f0ff" opacity="0.85" stroke="#b7d9f5" stroke-width="6"/>
</svg>

