<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Math & Science Wiki</title>
    <style>
        /* —— layout unchanged —— */
        body{margin:0;font-family:system-ui,sans-serif;display:flex;flex-direction:column;height:100vh;}
        nav#topbar{display:flex;background:#212121;color:#fff;padding:0.5rem 1rem;gap:1rem;}
        nav#topbar a{color:#fff;text-decoration:none;padding:0.25rem 0.5rem;}
        nav#topbar a:hover{background:#424242;border-radius:4px;}
        #main{flex:1;display:flex;overflow:hidden;}
        #sidebar{width:240px;background:#f3f3f3;padding:1rem;border-right:1px solid #ddd;display:flex;flex-direction:column;gap:1rem;overflow-y:auto;}
        #sidebar h2{font-size:1rem;margin:0;}
        #new-btn{display:block;padding:0.4rem 0.7rem;margin-bottom:0.5rem;border:1px solid #1a73e8;border-radius:4px;background:#1a73e8;color:#fff;cursor:pointer;font-size:0.85rem;text-align:center;}
        #article-list{list-style:none;padding:0;margin:0;flex:1 1 auto;overflow-y:auto;}
        #article-list li{margin:0.3rem 0;}
        #article-list button{background:none;border:none;color:#1a73e8;text-align:left;font-size:0.9rem;width:100%;cursor:pointer;}
        #content{flex:1;padding:1rem;overflow-y:auto;max-width:65ch;line-height:1.5;}
        #content h2,#content h3,#content h4{margin:1.2em 0 0.5em;font-weight:600;}
        .controls{margin-top:2rem;display:flex;gap:0.75rem;}
        .controls button{padding:0.5rem 1rem;border:none;border-radius:4px;cursor:pointer;font-size:0.9rem;}
        .controls .edit{background:#ffb300;color:#000;}
        .controls .delete{background:#e53935;color:#fff;}
        textarea#editor{width:100%;height:55vh;font-family:monospace;font-size:1rem;}
    </style>

    <!-- Firebase SDKs -->
    <!-- Firebase (namespaced / compat build) -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <script>
        // —— minimal config: include authDomain to silence localhost warning ——
        const firebaseConfig={
            apiKey:"AIzaSyCJTmL7fVTkf328MLSr-8je95CqtSxfMo0",
            projectId:"quantara-1",
            authDomain:"quantara-1.firebaseapp.com"
        };
        firebase.initializeApp(firebaseConfig);
        const db=firebase.firestore();
    </script>

    <script>
        /* ---------- helper: LaTeX→HTML ---------- */
        function latexMarkupToHTML(src){
            src=src.replace(/\\begin{itemize}([\s\S]*?)\\end{itemize}/g,(m,inner)=>{
                const items=inner.split(/\\item/).filter(s=>s.trim());
                return '<ul>'+items.map(s=>'<li>'+s.trim()+'</li>').join('')+'</ul>';
            });
            return src
                .replace(/\\section\*?{([^}]+)}/g,'<h2>$1</h2>')
                .replace(/\\subsection\*?{([^}]+)}/g,'<h3>$1</h3>')
                .replace(/\\subsubsection\*?{([^}]+)}/g,'<h4>$1</h4>')
                .replace(/\\break/g,'<br>')
                .replace(/\\\\(?=\s|$)/g,'<br>');
        }

        /* ---------- Firestore helpers with error logging ---------- */
        let articles=[];
        let currentIndex=0;
        let editMode=false;

        async function fetchArticles(){
            try{
                const snap=await db.collection('articles').orderBy('title').get();
                articles=snap.docs.map(d=>({...d.data(),id:d.id}));
            }catch(err){
                console.error('Fetch failed:',err);
                alert('Error fetching articles – check Firestore Rules or CORS console.');
            }
        }

        async function pushArticle(article){
            try{
                const ref=await db.collection('articles').add(article);
                article.id=ref.id;
            }catch(err){
                console.error('Create failed:',err);
                alert('Could not create article – permission issue?');
            }
        }

        async function updateArticle(article){
            try{
                await db.collection('articles').doc(article.id).set({title:article.title,content:article.content});
            }catch(err){
                console.error('Save failed:',err);
                alert('Save error – see console for details.');
            }
        }

        async function deleteArticleFromDB(article){
            try{
                await db.collection('articles').doc(article.id).delete();
            }catch(err){
                console.error('Delete failed:',err);
                alert('Delete error – check permissions.');
            }
        }

        /* ---------- UI ---------- */
        function buildList(){
            const list=document.getElementById('article-list');
            list.innerHTML='';
            articles.forEach((art,i)=>{
                const li=document.createElement('li');
                const btn=document.createElement('button');
                btn.textContent=art.title||`Untitled ${i+1}`;
                btn.onclick=()=>loadArticle(i);
                li.appendChild(btn);
                list.appendChild(li);
            });
        }

        function loadArticle(i){
            if(i<0||i>=articles.length) return;
            currentIndex=i;
            editMode=false;
            const cont=document.getElementById('content');
            const html=latexMarkupToHTML(articles[i].content||'');
            cont.innerHTML=`<article><h1>${articles[i].title}</h1><div id="article-body">${html}</div><div class="controls"><button class="edit" onclick="toggleEdit()">Edit</button><button class="delete" onclick="removeArticle()">Delete</button></div></article>`;
            window.MathJax && MathJax.typesetPromise([cont]);
        }

        async function toggleEdit(){
            const body=document.getElementById('article-body');
            const btn=document.querySelector('.edit');
            if(!editMode){
                const ta=document.createElement('textarea');
                ta.id='editor';
                ta.value=articles[currentIndex].content||'';
                body.replaceWith(ta);
                btn.textContent='Save';
                editMode=true;
            }else{
                const newContent=document.getElementById('editor').value;
                const a=articles[currentIndex];
                a.content=newContent;
                await updateArticle(a);
                loadArticle(currentIndex);
            }
        }

        async function removeArticle(){
            if(!confirm('Delete this article?')) return;
            await deleteArticleFromDB(articles[currentIndex]);
            articles.splice(currentIndex,1);
            buildList();
            if(articles.length) loadArticle(0); else document.getElementById('content').textContent='No articles yet.';
        }

        async function createArticle(){
            const title=prompt('Article title?');
            if(!title) return;
            const art={title,content:''};
            await pushArticle(art);
            articles.push(art);
            buildList();
            loadArticle(articles.length-1);
            toggleEdit();
        }

        /* ---------- Init ---------- */
        async function init(){
            document.getElementById('new-btn').addEventListener('click',createArticle);
            await fetchArticles();
            buildList();
            if(articles.length) loadArticle(0);
        }
    </script>

    <!-- MathJax -->
    <script>
        window.MathJax={tex:{inlineMath:[["$","$"],["\\(","\\)"]],displayMath:[["$$","$$"],["\\[","\\]"]],packages:{'[+]':['ams']}}};
    </script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
</head>
<body>
<nav id="topbar">
    <a href="#index.html">Home</a>
    <a href="wiki.html">Wiki</a>
    <a href="test.html">Test</a>
    <a href="community.html">Community</a>
    <a href="#">Problem&nbsp;Archive</a>
</nav>

<div id="main">
    <aside id="sidebar">
        <h2>Articles</h2>
        <button id="new-btn">+ New Article</button>
        <ul id="article-list"></ul>
    </aside>

    <section id="content"></section>
</div>

<script>
    window.addEventListener('DOMContentLoaded',init);
</script>
</body>
</html>
