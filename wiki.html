<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Math &amp; Science Wiki</title>
    <link rel='stylesheet' href="style.css">

    <!-- Firebase compat build -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>

    <script>
        const firebaseConfig={apiKey:"AIzaSyCJTmL7fVTkf328MLSr-8je95CqtSxfMo0",projectId:"quantara-1",authDomain:"quantara-1.firebaseapp.com"};
        firebase.initializeApp(firebaseConfig);
        const db=firebase.firestore();
    </script>

    <script src="Latex_render.js"></script>


    <script>

        /* ---------- Firestore helpers ---------- */
        let articles=[]; // {id,title,content,slug}
        let currentIndex=-1;
        let editMode=false;

        async function fetchArticles(){
            const snap=await db.collection('articles').orderBy('title').get();
            articles=[];
            for(const d of snap.docs){
                const data=d.data();
                let {title,content,slug}=data;
                if(!slug){
                    slug=slugify(title||'');
                    await d.ref.update({slug});
                }
                articles.push({id:d.id,title,content,slug});
            }
        }
        async function pushArticle(article){const ref=await db.collection('articles').add(article);article.id=ref.id;}
        async function updateArticle(article){await db.collection('articles').doc(article.id).set(article);}
        async function deleteArticleFromDB(article){await db.collection('articles').doc(article.id).delete();}

        /* ---------- UI ---------- */
        function buildList(){
            const list=document.getElementById('article-list');
            list.innerHTML='';
            articles.forEach((art,i)=>{
                const li=document.createElement('li');
                const btn=document.createElement('button');
                btn.textContent=art.title||`Untitled ${i+1}`;
                btn.onclick=()=>loadArticle(i,true);
                li.appendChild(btn);
                list.appendChild(li);
            });
        }
        const findIndexBySlug=slug=>articles.findIndex(a=>a.slug===slug);

        function loadArticle(i,setHash=false){
            if(i<0||i>=articles.length) return;
            currentIndex=i;
            if(setHash) location.hash=articles[i].slug;
            editMode=false;

            const cont=document.getElementById('content');
            const html=latexMarkupToHTML(articles[i].content||'');

            cont.innerHTML = `
        <article>
            <h1>${articles[i].title}</h1>
            <div id="article-body">${html}</div>
            <div class="controls">
                <button class="edit" onclick="toggleEdit()">Edit</button>
                <button class="delete" onclick="removeArticle()">Delete</button>
            </div>
        </article>`;

            // ✅ 统一排版公式 + TikZ
            renderLatex(cont);
        }

        async function toggleEdit(){
            const body=document.getElementById('article-body');
            const btn=document.querySelector('.edit');
            if(!editMode){
                const ta=document.createElement('textarea');
                ta.id='editor';
                ta.value=articles[currentIndex].content||'';
                body.replaceWith(ta);
                btn.textContent='Save';
                editMode=true;
            }else{
                const newContent=document.getElementById('editor').value;
                const a=articles[currentIndex];
                a.content=newContent;
                await updateArticle(a);
                loadArticle(currentIndex);
            }
        }

        async function removeArticle(){
            if(!confirm('Delete this article?')) return;
            await deleteArticleFromDB(articles[currentIndex]);
            articles.splice(currentIndex,1);
            buildList();
            location.hash='';
            document.getElementById('content').textContent='Deleted.';
        }

        async function createArticle(){
            const title=prompt('Article title?');
            if(!title) return;
            const slug=slugify(title);
            if(findIndexBySlug(slug)!==-1){alert('Article exists');return;}
            const art={title,slug,content:`\\section*{${title}}\n`};
            await pushArticle(art);
            articles.push(art);
            buildList();
            loadArticle(articles.length-1,true);
            toggleEdit();
        }

        const auth = firebase.auth();

        /* navbar UI */
        auth.onAuthStateChanged(async user=>{
            const login  = document.getElementById('loginBtn');
            const logout = document.getElementById('logoutBtn');
            const avatar = document.getElementById('navAvatar');

            if(user){
                login.style.display  = 'none';
                logout.style.display = 'inline';
                // fetch photoURL if present
                const snap = await db.doc(`users/${user.uid}`).get();
                const url  = (snap.exists && snap.data().photoURL) || 'https://via.placeholder.com/28';
                avatar.src = url;   avatar.style.display='inline';
            }else{
                login.style.display  = 'inline';
                logout.style.display = avatar.style.display = 'none';
            }
        });

        document.getElementById('loginBtn').onclick = ()=> location.href='login.html';
        document.getElementById('logoutBtn').onclick= ()=> auth.signOut();

        /* ---------- Init ---------- */
        async function init(){
            document.getElementById('new-btn').addEventListener('click',createArticle);
            window.addEventListener('hashchange',()=>{
                const idx=findIndexBySlug(location.hash.slice(1));
                if(idx!==-1) loadArticle(idx,false);
            });
            await fetchArticles();
            buildList();
            const idx=findIndexBySlug(location.hash.slice(1));
            if(idx!==-1) loadArticle(idx); else if(articles.length) loadArticle(0); else document.getElementById('content').textContent='No articles yet.';
        }
    </script>

    <!-- MathJax -->
    <script>window.MathJax={tex:{inlineMath:[["$","$"],["\\(","\\)"]],displayMath:[["$$","$$"],["\\[","\\]"]],packages:{'[+]':['ams']}}};</script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <link rel="stylesheet" type="text/css" href="https://tikzjax.com/v1/fonts.css">
    <script src="https://tikzjax.com/v1/tikzjax.js"></script>

</head>
<body>
<nav id="topbar">
    <a href="#index.html">Home</a>
    <a href="wiki.html">Wiki</a>
    <a href="test.html">Test</a>
    <a href="community.html">Community</a>
    <a href="#">Problem&nbsp;Archive</a>
    <span style="margin-left:auto"></span>
    <button id="loginBtn">Login</button>
    <button id="logoutBtn" style="display:none">Logout</button>
    <img id="navAvatar" src="https://via.placeholder.com/28"
         style="width:28px;height:28px;border-radius:50%;display:none;margin-left:.5rem">

</nav>
<div id="main">
    <aside id="sidebar">
        <h2>Articles</h2>
        <button id="new-btn">+ New Article</button>
        <ul id="article-list"></ul>
    </aside>
    <section id="content"></section>
</div>
<script>window.addEventListener('DOMContentLoaded',init);</script>
</body>
</html>
