<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Math &amp; Science Wiki</title>
    <style>
        body{margin:0;font-family:system-ui,sans-serif;display:flex;flex-direction:column;height:100vh;}
        nav#topbar{display:flex;background:#212121;color:#fff;padding:0.5rem 1rem;gap:1rem;}
        nav#topbar a{color:#fff;text-decoration:none;padding:0.25rem 0.5rem;}
        nav#topbar a:hover{background:#424242;border-radius:4px;}
        #main{flex:1;display:flex;overflow:hidden;}
        #sidebar{width:240px;background:#f3f3f3;padding:1rem;border-right:1px solid #ddd;display:flex;flex-direction:column;gap:1rem;overflow-y:auto;}
        #sidebar h2{font-size:1rem;margin:0;}
        #new-btn{display:block;padding:0.4rem 0.7rem;margin-bottom:0.5rem;border:1px solid #1a73e8;border-radius:4px;background:#1a73e8;color:#fff;cursor:pointer;font-size:0.85rem;text-align:center;}
        #article-list{list-style:none;padding:0;margin:0;flex:1 1 auto;overflow-y:auto;}
        #article-list li{margin:0.3rem 0;}
        #article-list button{background:none;border:none;color:#1a73e8;text-align:left;font-size:0.9rem;width:100%;cursor:pointer;}
        #content{flex:1;padding:1rem;overflow-y:auto;max-width:65ch;line-height:1.5;}
        #content h2,#content h3,#content h4{margin:1.2em 0 0.5em;font-weight:600;}
        .controls{margin-top:2rem;display:flex;gap:0.75rem;}
        .controls button{padding:0.5rem 1rem;border:none;border-radius:4px;cursor:pointer;font-size:0.9rem;}
        .controls .edit{background:#ffb300;color:#000;}
        .controls .delete{background:#e53935;color:#fff;}
        textarea#editor{width:100%;height:55vh;font-family:monospace;font-size:1rem;}
        a.wiki-link{color:#1a73e8;text-decoration:underline;cursor:pointer;}
    </style>

    <!-- Firebase compat build -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <script>
        const firebaseConfig={apiKey:"AIzaSyCJTmL7fVTkf328MLSr-8je95CqtSxfMo0",projectId:"quantara-1",authDomain:"quantara-1.firebaseapp.com"};
        firebase.initializeApp(firebaseConfig);
        const db=firebase.firestore();
    </script>

    <script src="Latex_render.js"></script>


    <script>

        /* ---------- Firestore helpers ---------- */
        let articles=[]; // {id,title,content,slug}
        let currentIndex=-1;
        let editMode=false;

        async function fetchArticles(){
            const snap=await db.collection('articles').orderBy('title').get();
            articles=[];
            for(const d of snap.docs){
                const data=d.data();
                let {title,content,slug}=data;
                if(!slug){
                    slug=slugify(title||'');
                    await d.ref.update({slug});
                }
                articles.push({id:d.id,title,content,slug});
            }
        }
        async function pushArticle(article){const ref=await db.collection('articles').add(article);article.id=ref.id;}
        async function updateArticle(article){await db.collection('articles').doc(article.id).set(article);}
        async function deleteArticleFromDB(article){await db.collection('articles').doc(article.id).delete();}

        /* ---------- UI ---------- */
        function buildList(){
            const list=document.getElementById('article-list');
            list.innerHTML='';
            articles.forEach((art,i)=>{
                const li=document.createElement('li');
                const btn=document.createElement('button');
                btn.textContent=art.title||`Untitled ${i+1}`;
                btn.onclick=()=>loadArticle(i,true);
                li.appendChild(btn);
                list.appendChild(li);
            });
        }
        const findIndexBySlug=slug=>articles.findIndex(a=>a.slug===slug);

        function loadArticle(i,setHash=false){
            if(i<0||i>=articles.length) return;
            currentIndex=i;
            if(setHash) location.hash=articles[i].slug;
            editMode=false;
            const cont=document.getElementById('content');
            const html=latexMarkupToHTML(articles[i].content||'');
            cont.innerHTML=`<article><h1>${articles[i].title}</h1><div id="article-body">${html}</div><div class="controls"><button class="edit" onclick="toggleEdit()">Edit</button><button class="delete" onclick="removeArticle()">Delete</button></div></article>`;
            window.MathJax && MathJax.typesetPromise([cont]);
        }

        async function toggleEdit(){
            const body=document.getElementById('article-body');
            const btn=document.querySelector('.edit');
            if(!editMode){
                const ta=document.createElement('textarea');
                ta.id='editor';
                ta.value=articles[currentIndex].content||'';
                body.replaceWith(ta);
                btn.textContent='Save';
                editMode=true;
            }else{
                const newContent=document.getElementById('editor').value;
                const a=articles[currentIndex];
                a.content=newContent;
                await updateArticle(a);
                loadArticle(currentIndex);
            }
        }

        async function removeArticle(){
            if(!confirm('Delete this article?')) return;
            await deleteArticleFromDB(articles[currentIndex]);
            articles.splice(currentIndex,1);
            buildList();
            location.hash='';
            document.getElementById('content').textContent='Deleted.';
        }

        async function createArticle(){
            const title=prompt('Article title?');
            if(!title) return;
            const slug=slugify(title);
            if(findIndexBySlug(slug)!==-1){alert('Article exists');return;}
            const art={title,slug,content:`\\section*{${title}}\n`};
            await pushArticle(art);
            articles.push(art);
            buildList();
            loadArticle(articles.length-1,true);
            toggleEdit();
        }

        /* ---------- Init ---------- */
        async function init(){
            document.getElementById('new-btn').addEventListener('click',createArticle);
            window.addEventListener('hashchange',()=>{
                const idx=findIndexBySlug(location.hash.slice(1));
                if(idx!==-1) loadArticle(idx,false);
            });
            await fetchArticles();
            buildList();
            const idx=findIndexBySlug(location.hash.slice(1));
            if(idx!==-1) loadArticle(idx); else if(articles.length) loadArticle(0); else document.getElementById('content').textContent='No articles yet.';
        }
    </script>

    <!-- MathJax -->
    <script>window.MathJax={tex:{inlineMath:[["$","$"],["\\(","\\)"]],displayMath:[["$$","$$"],["\\[","\\]"]],packages:{'[+]':['ams']}}};</script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <link rel="stylesheet" type="text/css" href="https://tikzjax.com/v1/fonts.css">
    <script src="https://tikzjax.com/v1/tikzjax.js"></script>

</head>

        <h2>Articles</h2>
        <button id="new-btn">+ New Article</button>
        <ul id="article-list"></ul>
    </aside>
    <section id="content"></section>
</div>
<script>window.addEventListener('DOMContentLoaded',init);</script>
</body>
</html>
