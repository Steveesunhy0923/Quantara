<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Community</title>

    <style>
        /* —— layout unchanged —— */
        body{margin:0;font-family:system-ui,sans-serif;display:flex;flex-direction:column;height:100vh;}
        nav#topbar{display:flex;background:#212121;color:#fff;padding:0.5rem 1rem;gap:1rem;}
        nav#topbar a{color:#fff;text-decoration:none;padding:0.25rem 0.5rem;}
        nav#topbar a:hover{background:#424242;border-radius:4px;}
        #main{flex:1;display:flex;overflow:hidden;}
        #sidebar{width:240px;background:#f3f3f3;padding:1rem;border-right:1px solid #ddd;display:flex;flex-direction:column;gap:1rem;overflow-y:auto;}
        #sidebar h2{font-size:1rem;margin:0;}
        #new-btn{display:block;padding:0.4rem 0.7rem;margin-bottom:0.5rem;border:1px solid #1a73e8;border-radius:4px;background:#1a73e8;color:#fff;cursor:pointer;font-size:0.85rem;text-align:center;}
        #article-list{list-style:none;padding:0;margin:0;flex:1 1 auto;overflow-y:auto;}
        #article-list li{margin:0.3rem 0;}
        #article-list button{background:none;border:none;color:#1a73e8;text-align:left;font-size:0.9rem;width:100%;cursor:pointer;}
        #content{flex:1;padding:1rem;overflow-y:auto;max-width:65ch;line-height:1.5;}
        #content h2,#content h3,#content h4{margin:1.2em 0 0.5em;font-weight:600;}
        .controls{margin-top:2rem;display:flex;gap:0.75rem;}
        .controls button{padding:0.5rem 1rem;border:none;border-radius:4px;cursor:pointer;font-size:0.9rem;}
        .controls .edit{background:#ffb300;color:#000;}
        .controls .delete{background:#e53935;color:#fff;}
        textarea#editor{width:100%;height:55vh;font-family:monospace;font-size:1rem;}
    </style>
    <script>
        function latexMarkupToHTML(src){
            src=src.replace(/\\begin{itemize}([\s\S]*?)\\end{itemize}/g,(m,inner)=>{
                const items=inner.split(/\\item/).filter(s=>s.trim());
                return '<ul>'+items.map(s=>'<li>'+s.trim()+'</li>').join('')+'</ul>';
            });
            return src
                .replace(/\\section\*?{([^}]+)}/g,'<h2>$1</h2>')
                .replace(/\\subsection\*?{([^}]+)}/g,'<h3>$1</h3>')
                .replace(/\\subsubsection\*?{([^}]+)}/g,'<h4>$1</h4>')
                .replace(/\\break/g,'<br>')
                .replace(/\\\\(?=\s|$)/g,'<br>');
        }
    </script>
</head>
