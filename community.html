<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Community</title>

    <!-- shared style sheet -->
    <link rel="stylesheet" href="style.css">
    <style>
        .post-card{border:1px solid #ddd;border-radius:8px;padding:1rem;margin-bottom:1rem;background:#fff;max-width:60ch}
        .post-card h3{margin:0 0 .25rem;font-size:1.1rem}
        .post-card small{color:#666}
        .post-body{margin:.5rem 0}
        .post-actions{display:flex;gap:.7rem;font-size:.9rem;color:#555}
        .post-actions button{border:none;background:none;cursor:pointer;color:inherit}
        .actions-right{margin-left:auto}

        #sidebar{align-items:flex-start}
        #new-post-btn{font-size:1.4rem;padding:.2rem .6rem;margin-bottom:.5rem;background:#1a73e8;color:#fff;border:none;border-radius:6px;cursor:pointer;width:100%}
        #forum-list button{display:block;width:100%;margin:2px 0;padding:.35rem;border:none;border-radius:4px;background:#f5f5f5;text-align:left;cursor:pointer}
        #forum-list button.active{background:#d2e3fc;font-weight:600}
    </style>

    <script src="Latex_render.js"></script>

    <!-- Firebase 9 compat (App, Auth, Firestore) -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <script>
        const firebaseConfig={apiKey:"AIzaSyCJTmL7fVTkf328MLSr-8je95CqtSxfMo0",projectId:"quantara-1",authDomain:"quantara-1.firebaseapp.com"};
        firebase.initializeApp(firebaseConfig);
    </script>

    <!-- MathJax & TikZJax -->
    <script>window.MathJax={tex:{inlineMath:[["$","$"],["\\(","\\)"]],displayMath:[["$$","$$"],["\\[","\\]"]],packages:{'[+]':['ams']}}};</script>
    <script async id="MathJax-script" src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/tikzjax@1.0.4/tikzjax.min.js" defer onload="TikzJax.config({lazy:false,wasmURL:'https://cdn.jsdelivr.net/npm/tikzjax@1.0.4/tikzjax.wasm'});"></script>
</head>
<body>
<nav id="topbar">
    <a href="#index.html">Home</a>
    <a href="wiki.html">Wiki</a>
    <a href="test.html">Test</a>
    <a href="community.html">Community</a>
    <a href="#">Problem&nbsp;Archive</a>
    <span style="margin-left:auto"></span>
    <img id="avatar" src="https://via.placeholder.com/32" alt="profile" style="width:32px;height:32px;border-radius:50%;cursor:pointer;display:none;margin-right:.5rem">
    <button id="login-btn">Login</button>
    <button id="logout-btn" style="display:none">Logout</button>
</nav>

<div id="main">
    <aside id="sidebar">
        <button id="new-post-btn" title="New post">＋</button>
        <nav id="forum-list">
            <button data-forum="">🏠 All</button>
            <button data-forum="algebra">Algebra</button>
            <button data-forum="geometry">Geometry</button>
            <button data-forum="number theory">Number&nbsp;Theory</button>
            <button data-forum="combinatorics">Combinatorics</button>
            <button data-forum="calculus">Calculus</button>
        </nav>
    </aside>
    <section id="content"></section>
</div>

<script>
    (function(){
        const auth = firebase.auth();
        const db   = firebase.firestore();

        /* ---------- auth ui ----------- */
        const loginBtn  = document.getElementById('login-btn');
        const logoutBtn = document.getElementById('logout-btn');

        loginBtn.onclick  = () => location.href='login.html';
        logoutBtn.onclick = () => auth.signOut();

        auth.onAuthStateChanged(u=>{
            loginBtn.style.display  = u? 'none':'inline-block';
            logoutBtn.style.display = u? 'inline-block':'none';
        });

        /* ---------- feed  ------------- */
        const feed      = document.getElementById('content');
        const listNav   = document.getElementById('forum-list');
        const newBtn    = document.getElementById('new-post-btn');
        let   forum     = "";
        let   detach    = null;

        // build card (with like/comment/delete)
        function renderPost(doc){
            const d        = doc.data();
            const uid      = auth.currentUser && auth.currentUser.uid;

            const likes    = d.likes || 0;
            const comments = d.comments || 0;
            const canDel   = uid && (uid===d.author || uid==='ADMIN_UID');

            const card = document.createElement('article');
            card.className='post-card';
            card.innerHTML = `
      <h3>${d.title}</h3>
      <small>${(d.discussion||'misc').toUpperCase()} · ${(d.time&&d.time.toDate?d.time.toDate():new Date()).toLocaleString()}</small>
      <div class="post-body">${latexMarkupToHTML(d.post)}</div>
      <div class="post-actions">
        <button class="like-btn">👍 <span>${likes}</span></button>
        <button class="comment-btn">💬 <span>${comments}</span></button>
        <span class="actions-right">${canDel?'<button class="del-btn">🗑️</button>':''}</span>
      </div>`;

            // Like handler
            card.querySelector('.like-btn').onclick = async ()=>{
                if(!auth.currentUser){alert('Login first');return;}
                await db.runTransaction(async t=>{
                    const snap = await t.get(doc.ref);
                    const cur  = snap.data().likes || 0;
                    t.update(doc.ref,{likes:cur+1});
                });
            };

            // Delete handler
            if(canDel){
                card.querySelector('.del-btn').onclick = async ()=>{
                    if(confirm('Delete this post?')) await doc.ref.delete();
                };
            }

            renderLatex(card);
            feed.appendChild(card);
        }

        function listen(){
            if(detach) detach();
            feed.textContent='Loading…';
            let ref=db.collection('communityPosts').orderBy('time','desc');
            if(forum) ref=ref.where('discussion','==',forum);
            detach=ref.limit(50).onSnapshot(qs=>{
                feed.innerHTML='';
                qs.forEach(renderPost);
                if(!qs.size) feed.textContent='No posts yet.';
            });
        }

        listNav.addEventListener('click',e=>{
            const btn=e.target.closest('button[data-forum]');
            if(!btn) return;
            forum=btn.getAttribute('data-forum');
            Array.from(listNav.children).forEach(b=>b.classList.toggle('active',b===btn));
            listen();
        });

        newBtn.onclick = ()=>{
            if(!auth.currentUser){alert('Please login first');return;}
            location.href='new-post.html';
        };

        listen();
    })();
</script>
</body>
</html>
